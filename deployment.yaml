apiVersion: apps/v1
kind: Deployment
metadata:
  name: intranet-portal
  labels:
    app: intranet-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: intranet-portal
  template:
    metadata:
      labels:
        app: intranet-portal
    spec:
      containers:
        - name: intranet-portal
          image: intranet-portal:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20